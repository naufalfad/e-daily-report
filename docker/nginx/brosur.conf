server {
    listen 80;
    server_name brosur.geocitra.com;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name brosur.geocitra.com;
    server_tokens off;

    # Pasang Sertifikat SSL yang baru di-generate
    ssl_certificate /etc/letsencrypt/live/brosur.geocitra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brosur.geocitra.com/privkey.pem;

    client_max_body_size 100M;

    # Route Backend (API & Uploads)
    location /api/ {
        proxy_pass http://172.17.0.1:4006; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Route Frontend (Next.js)
    location / {
        proxy_pass http://172.17.0.1:3006;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
