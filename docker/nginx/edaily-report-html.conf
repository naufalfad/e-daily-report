server {
    listen 80;
    server_name edaily-report.geocitra.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name edaily-report.geocitra.com;

    # Path SSL ini sengaja pake dki karena sertifikatnya digabung sama let's encrypt
    ssl_certificate /etc/letsencrypt/live/edaily-dki.geocitra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edaily-dki.geocitra.com/privkey.pem;

    location / {
        proxy_pass http://edaily-report-web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
