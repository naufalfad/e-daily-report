server {
    listen 80;
    server_name rekas-demo.geocitra.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name rekas-demo.geocitra.com;

    ssl_certificate /etc/letsencrypt/live/rekas-demo.geocitra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rekas-demo.geocitra.com/privkey.pem;

    location / {
        proxy_pass http://rekas-demo-web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
