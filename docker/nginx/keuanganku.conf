# --- BLOK HTTP (Redirect ke HTTPS) ---
server {
    listen 80;
    server_name keuanganku.geocitra.com;
    server_tokens off;

    # Endpoint untuk perpanjangan SSL Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect otomatis semua traffic HTTP ke HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- BLOK HTTPS ---
server {
    listen 443 ssl;
    server_name keuanganku.geocitra.com;
    server_tokens off;

    # Konfigurasi SSL (Certbot)
    ssl_certificate /etc/letsencrypt/live/keuanganku.geocitra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/keuanganku.geocitra.com/privkey.pem;

    # Optimasi Keamanan SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Sinkronisasi Body Limit (Samakan dengan NestJS 50MB)
    client_max_body_size 50M;

    # [1] ROUTING BACK-END (API)
    # Mengarah ke container 'keuanganku-be' port 4000
    location ^~ /api {
        proxy_pass http://keuanganku-be:4000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout ditingkatkan untuk mencegah putus di tengah jalan saat upload/proses berat
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # [2] ROUTING STATIC UPLOADS (GAMBAR) - [BAGIAN PENTING BARU]
    # Mengarah ke container 'keuanganku-be' port 4000
    # Karena file fisik ada di volume yang dimount ke container backend
    location ^~ /uploads {
        proxy_pass http://keuanganku-be:4000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # [3] ROUTING FRONT-END (Next.js)
    # Mengarah ke container 'keuanganku-fe' port 3000
    location / {
        proxy_pass http://keuanganku-fe:3000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Penanganan Error Page oleh Next.js
        proxy_intercept_errors on;
        error_page 404 /index.html;
    }

    # SOCKET.IO
    location /socket.io/ {
        proxy_pass http://keuanganku-be:4000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
