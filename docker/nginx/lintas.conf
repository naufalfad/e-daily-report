server {
    listen 80;
    server_name lintas.geocitra.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name lintas.geocitra.com;

    ssl_certificate /etc/letsencrypt/live/lintas.geocitra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lintas.geocitra.com/privkey.pem;

    location / {
        # Pakai IP langsung biar Nginx gak panik pas start
	proxy_pass http://asset-dishub-web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
