# 1. REDIRECT Domain Lama ke Baru (HTTPS to HTTPS)
server {
    listen 443 ssl;
    server_name keuanganku.geocitra.com;
    ssl_certificate /etc/letsencrypt/live/keuanganku.geocitra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/keuanganku.geocitra.com/privkey.pem;
    return 301 https://keuanganku.id$request_uri;
}

# 2. Domain Utama BARU (HTTPS)
server {
    listen 443 ssl;
    server_name keuanganku.id;

    ssl_certificate /etc/letsencrypt/live/keuanganku.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/keuanganku.id/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    client_max_body_size 50M;

# [TAMBAHKAN INI] Biar PWA & Manifest gak kena redirect/error
    location ~* \.(js|css|webmanifest|ico|png|svg|sw\.js)$ {
        proxy_pass http://keuanganku-fe:3000;
        proxy_set_header Host $host;
        # Matikan intercept errors khusus file statis agar gak kena redirect login
        proxy_intercept_errors off; 
    }

    # [TAMBAHKAN INI] Paksa HTTPS di level Header (Solusi Not Secure tadi)
    add_header Content-Security-Policy "upgrade-insecure-requests";

    # Backend API
    location ^~ /api {
        proxy_pass http://keuanganku-be:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static Uploads
    location ^~ /uploads {
        proxy_pass http://keuanganku-be:4000;
        proxy_set_header Host $host;
    }

    # Frontend Next.js
    location / {
        proxy_pass http://keuanganku-fe:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 404 /index.html;
    }

    # Socket.io (Jika dipakai)
    location /socket.io/ {
        proxy_pass http://keuanganku-be:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
}

# 3. Redirect HTTP ke HTTPS (Semua Domain)
server {
    listen 80;
    server_name keuanganku.id keuanganku.geocitra.com;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}
